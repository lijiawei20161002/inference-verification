<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ivgym — demo</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      max-width: 100%;
      max-height: 100vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <!-- autoplay needs muted; loop + controls let you replay/scrub -->
  <video src="demo.mp4" autoplay loop muted playsinline controls></video>
</body>
</html>
